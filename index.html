<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break'n Bad | Instant Rips Pack Dashboard</title>
    <style>
        :root {
            /* Break'n Bad Brand Colors */
            --bnb-primary: #1a237e;     /* Deep blue */
            --bnb-secondary: #3949ab;   /* Medium blue */
            --bnb-accent: #ff6b35;      /* Break'n Bad orange */
            --bnb-gold: #ffc107;        /* Gold highlights */
            --bnb-dark: #0a0e27;        /* Dark navy background */
            --bnb-card: #1e2555;        /* Card background */
            --bnb-border: #3949ab40;    /* Border with opacity */
            
            /* Status Colors */
            --green: #4caf50;
            --red: #f44336;
            --orange: #ff9800;
            --gold: var(--bnb-gold);
            --text: #ffffff;
            --text-muted: #b0bec5;
            --hot: #ff5722;
            --cold: #607d8b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bnb-dark) 0%, var(--bnb-primary) 100%);
            color: var(--text);
            padding: 12px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: var(--bnb-card);
            border: 1px solid var(--bnb-border);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .brand-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(45deg, var(--bnb-accent), var(--bnb-gold));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .brand-text h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }
        
        .brand-text .subtitle {
            font-size: 0.85rem;
            color: var(--bnb-accent);
            font-weight: 500;
            margin: 0;
        }
        
        .header-meta {
            text-align: right;
        }
        
        .header-meta .timestamp {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin: 0;
        }
        
        .header-meta .status {
            color: var(--green);
            font-size: 0.75rem;
            margin: 4px 0 0 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bnb-card);
            border: 1px solid var(--bnb-border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        
        .stat-card .value {
            font-size: 1.6rem;
            font-weight: 700;
        }
        
        .stat-card .value.green { color: var(--green); }
        .stat-card .value.orange { color: var(--orange); }
        .stat-card .value.gold { color: var(--gold); }
        .stat-card .value.blue { color: var(--bnb-secondary); }

        .controls {
            background: var(--bnb-card);
            border: 1px solid var(--bnb-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: var(--bnb-primary);
            border: 1px solid var(--bnb-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--bnb-accent);
            color: var(--text);
            background: var(--bnb-accent);
        }

        .sort-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .sort-row span {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .sort-btn {
            background: none;
            border: 1px solid var(--bnb-border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .sort-btn:hover, .sort-btn.active {
            border-color: var(--bnb-accent);
            color: var(--bnb-accent);
        }

        .pack-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
        }
        
        .pack-card {
            background: var(--bnb-card);
            border: 1px solid var(--bnb-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .pack-card:hover {
            border-color: var(--bnb-accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .pack-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .pack-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
            flex: 1;
            padding-right: 12px;
        }

        .pack-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--bnb-gold);
            text-align: right;
        }

        .sport-category {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .cards-info {
            background: var(--bnb-primary);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .cards-total {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .cards-breakdown {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .card-type {
            text-align: center;
            padding: 6px 4px;
            border-radius: 6px;
            font-size: 0.7rem;
        }

        .card-type .count {
            font-weight: 700;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 2px;
        }

        .card-type.base {
            background: rgba(255,255,255,0.1);
            color: var(--text-muted);
        }

        .card-type.chase {
            background: rgba(57,73,171,0.3);
            color: var(--bnb-secondary);
        }

        .card-type.grail {
            background: rgba(255,193,7,0.3);
            color: var(--gold);
        }

        .odds-row {
            display: flex;
            gap: 8px;
        }

        .odds-pill {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            border-radius: 8px;
            font-size: 0.75rem;
            border: 1px solid;
        }

        .odds-pill .pct {
            font-weight: 700;
            font-size: 1rem;
            display: block;
            margin-bottom: 2px;
        }

        .odds-pill.chase {
            background: rgba(57,73,171,0.2);
            border-color: var(--bnb-secondary);
            color: var(--bnb-secondary);
        }

        .odds-pill.grail {
            background: rgba(255,193,7,0.2);
            border-color: var(--gold);
            color: var(--gold);
        }

        .hot-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hot-indicator.hot {
            background: linear-gradient(45deg, var(--hot), var(--bnb-accent));
            color: white;
            animation: pulse 2s infinite;
        }

        .hot-indicator.cold {
            background: var(--cold);
            color: white;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pack-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--bnb-border);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .tier-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tier-1 { background: rgba(139,148,158,0.2); color: var(--text-muted); }
        .tier-2 { background: rgba(57,73,171,0.2); color: var(--bnb-secondary); }
        .tier-3 { background: rgba(188,140,255,0.2); color: #bc8cff; }
        .tier-4 { background: rgba(255,193,7,0.2); color: var(--gold); }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.ready { background: var(--green); }
        .status-dot.sold { background: var(--red); }
        
        @media (max-width: 768px) {
            body { padding: 8px; }
            .header { padding: 16px; }
            .pack-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .sort-row { flex-direction: column; align-items: flex-start; gap: 8px; }
            .filters { flex-direction: column; }
        }
    </style>
</head>

        function init() {
            if (PACK_DATA && PACK_DATA.packs) {
                packData = PACK_DATA;
                updateTimestamp();
                generateStats();
                generateFilters();
                renderPacks();
            } else {
                console.error('No pack data available');
                document.getElementById('pack-grid').innerHTML = '<p style="text-align:center; color: var(--text-muted);">No pack data available</p>';
            }
        }

        function updateTimestamp() {
            const timestamp = new Date(packData.timestamp).toLocaleString();
            document.getElementById('timestamp').textContent = `Updated: ${timestamp}`;
        }

        function generateStats() {
            const packs = packData.packs;
            const totalPacks = packs.length;
            const totalCards = packs.reduce((sum, pack) => sum + pack.odds.totalCards, 0);
            const avgChaseOdds = (packs.reduce((sum, pack) => sum + pack.odds.chaseOddsPct, 0) / totalPacks).toFixed(1);
            const avgGrailOdds = (packs.reduce((sum, pack) => sum + pack.odds.grailOddsPct, 0) / totalPacks).toFixed(1);
            const hotPacks = packs.filter(pack => pack.odds.chaseOddsPct >= 13 && pack.odds.grailOddsPct >= 1.8).length;

            const stats = [
                { label: 'Total Packs', value: totalPacks, cls: 'green' },
                { label: 'Hot Packs', value: hotPacks, cls: 'orange' },
                { label: 'Avg Chase %', value: avgChaseOdds + '%', cls: 'blue' },
                { label: 'Avg Grail %', value: avgGrailOdds + '%', cls: 'gold' },
                { label: 'Total Cards', value: totalCards.toLocaleString(), cls: 'blue' }
            ];

            const statsHtml = stats.map(stat => `
                <div class="stat-card">
                    <div class="label">${stat.label}</div>
                    <div class="value ${stat.cls}">${stat.value}</div>
                </div>
            `).join('');

            document.getElementById('stats-grid').innerHTML = statsHtml;
        }

        function generateFilters() {
            const packs = packData.packs;
            const sports = [...new Set(packs.map(pack => getSportFromTitle(pack.title)))].sort();
            
            let filtersHtml = '<button class="filter-btn active" data-filter="all">All Packs</button>';
            filtersHtml += '<button class="filter-btn" data-filter="hot">🔥 Hot Packs</button>';
            
            sports.forEach(sport => {
                filtersHtml += `<button class="filter-btn" data-filter="${sport.toLowerCase()}">${sport}</button>`;
            });

            document.getElementById('filters').innerHTML = filtersHtml;
        }

        function getSportFromTitle(title) {
            const lower = title.toLowerCase();
            if (lower.includes('basketball')) return 'Basketball';
            if (lower.includes('football')) return 'Football';
            if (lower.includes('baseball')) return 'Baseball';
            if (lower.includes('pokemon')) return 'Pokemon';
            if (lower.includes('mixed')) return 'Mixed Sport';
            return 'Other';
        }

        function isHotPack(pack) {
            return pack.odds.chaseOddsPct >= 13 && pack.odds.grailOddsPct >= 1.8;
        }

        function filterPacks(packs) {
            if (currentFilter === 'all') return packs;
            if (currentFilter === 'hot') return packs.filter(isHotPack);
            
            const sport = currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1);
            return packs.filter(pack => getSportFromTitle(pack.title).toLowerCase() === currentFilter);
        }

        function sortPacks(packs) {
            const sorted = [...packs];
            
            switch (currentSort) {
                case 'chase-odds':
                    sorted.sort((a, b) => b.odds.chaseOddsPct - a.odds.chaseOddsPct);
                    break;
                case 'grail-odds':
                    sorted.sort((a, b) => b.odds.grailOddsPct - a.odds.grailOddsPct);
                    break;
                case 'price-low':
                    sorted.sort((a, b) => a.price.amount - b.price.amount);
                    break;
                case 'price-high':
                    sorted.sort((a, b) => b.price.amount - a.price.amount);
                    break;
                case 'cards-total':
                    sorted.sort((a, b) => b.odds.totalCards - a.odds.totalCards);
                    break;
            }
            
            return sorted;
        }

        function renderPacks() {
            const packs = sortPacks(filterPacks(packData.packs));
            
            const packsHtml = packs.map(pack => {
                const sport = getSportFromTitle(pack.title);
                const isHot = isHotPack(pack);
                const tierClass = pack.packTier ? `tier-${pack.packTier}` : 'tier-1';
                
                return `
                    <div class="pack-card">
                        ${isHot ? '<div class="hot-indicator hot">🔥 Hot</div>' : ''}
                        
                        <div class="pack-header">
                            <div>
                                <div class="pack-title">${pack.title}</div>
                                <div class="sport-category">${sport}</div>
                            </div>
                            <div class="pack-price">${pack.price.amountDisplay}</div>
                        </div>

                        <div class="cards-info">
                            <div class="cards-total">${pack.odds.totalCards.toLocaleString()} Total Cards</div>
                            
                            <div class="cards-breakdown">
                                <div class="card-type base">
                                    <span class="count">${pack.odds.baseCount}</span>
                                    Base
                                </div>
                                <div class="card-type chase">
                                    <span class="count">${pack.odds.chaseCount}</span>
                                    Chase
                                </div>
                                <div class="card-type grail">
                                    <span class="count">${pack.odds.grailCount}</span>
                                    Grail
                                </div>
                            </div>

                            <div class="odds-row">
                                <div class="odds-pill chase">
                                    <span class="pct">${pack.odds.chaseOddsPct}%</span>
                                    Chase Odds
                                </div>
                                <div class="odds-pill grail">
                                    <span class="pct">${pack.odds.grailOddsPct}%</span>
                                    Grail Odds
                                </div>
                            </div>
                        </div>

                        <div class="pack-footer">
                            <div class="tier-badge ${tierClass}">
                                ${pack.packTier ? `Tier ${pack.packTier}` : 'Standard'}
                            </div>
                            <div class="status-indicator">
                                <div class="status-dot ${pack.status === 'READY' ? 'ready' : 'sold'}"></div>
                                <span>${pack.status === 'READY' ? 'Available' : 'Sold Out'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('pack-grid').innerHTML = packsHtml;
        }

        // Event listeners
        document.addEventListener('click', e => {
            if (e.target.matches('.filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderPacks();
            }
            
            if (e.target.matches('.sort-btn')) {
                document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentSort = e.target.dataset.sort;
                renderPacks();
            }
        });
