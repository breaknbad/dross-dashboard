<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break'n Bad | Hot Packs 🔥</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bnb-dark: #0a0e27;
            --bnb-primary: #1a237e;
            --bnb-card: #151a3d;
            --bnb-card-hover: #1e2555;
            --bnb-accent: #ff6b35;
            --bnb-gold: #ffc107;
            --bnb-border: rgba(57,73,171,0.25);
            --text: #ffffff;
            --text-muted: #8892b0;
            --hot-red: #ff4444;
            --hot-orange: #ff6b35;
            --grail-purple: #b388ff;
            --chase-blue: #40c4ff;
            --green: #4caf50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bnb-dark);
            color: var(--text);
            min-height: 100vh;
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px 0;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .header h1 .accent { color: var(--bnb-accent); }

        .header .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .header .live-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Pack Cards */
        .pack-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pack-card {
            background: var(--bnb-card);
            border: 1px solid var(--bnb-border);
            border-radius: 16px;
            padding: 20px 24px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .pack-card:hover {
            background: var(--bnb-card-hover);
            border-color: rgba(57,73,171,0.5);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .pack-card.featured {
            border-color: var(--bnb-accent);
            border-width: 2px;
        }

        .pack-card.featured::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--bnb-accent), var(--bnb-gold));
        }

        .pack-info h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .pack-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .tag.grail {
            background: rgba(179,136,255,0.15);
            color: var(--grail-purple);
            border: 1px solid rgba(179,136,255,0.3);
        }

        .tag.chase {
            background: rgba(64,196,255,0.15);
            color: var(--chase-blue);
            border: 1px solid rgba(64,196,255,0.3);
        }

        .tag.hot {
            background: rgba(255,68,68,0.15);
            color: var(--hot-red);
            border: 1px solid rgba(255,68,68,0.3);
        }

        .tag.scarce {
            background: rgba(255,193,7,0.15);
            color: var(--bnb-gold);
            border: 1px solid rgba(255,193,7,0.3);
        }

        .pack-meta {
            display: flex;
            gap: 16px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .pack-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Right side stats */
        .pack-stats {
            text-align: right;
            min-width: 100px;
        }

        .pack-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--bnb-accent);
            margin-bottom: 4px;
        }

        .pack-remaining {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .pack-remaining.low {
            color: var(--hot-red);
            font-weight: 600;
        }

        /* Odds display */
        .odds-bar {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .odd-item {
            font-size: 0.8rem;
        }

        .odd-item .label {
            color: var(--text-muted);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .odd-item .value {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .odd-item .value.grail-color { color: var(--grail-purple); }
        .odd-item .value.chase-color { color: var(--chase-blue); }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .footer a {
            color: var(--bnb-accent);
            text-decoration: none;
        }

        .shop-link {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--bnb-accent), #ff8a50);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(255,107,53,0.3);
        }

        .shop-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,107,53,0.4);
        }

        /* Mobile */
        @media (max-width: 600px) {
            .pack-card {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 16px;
            }
            .pack-stats {
                text-align: left;
                display: flex;
                align-items: center;
                gap: 16px;
            }
            .header h1 { font-size: 1.6rem; }
            .odds-bar { gap: 8px; }
        }
    </style>
</head>
<body>

        function render() {
            const container = document.getElementById('packList');
            const packs = PACK_DATA.packs || [];

            document.getElementById('timestamp').textContent = 
                new Date(PACK_DATA.timestamp).toLocaleString('en-US', {
                    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
                });

            container.innerHTML = packs.map((pack, i) => {
                const tags = (pack.tags || []).map(t => {
                    const cls = t.type || 'hot';
                    return `<span class="tag ${cls}">${t.icon || ''} ${t.label}</span>`;
                }).join('');

                const remaining = pack.remaining || 0;
                const lowClass = remaining < 50 ? 'low' : '';
                const featured = i < 3 ? 'featured' : '';

                const grailPct = pack.grailPct || '0';
                const chasePct = pack.chasePct || '0';
                const price = pack.price || 0;

                return `
                    <div class="pack-card ${featured}">
                        <div class="pack-info">
                            <h3>${pack.title}</h3>
                            <div class="pack-tags">${tags}</div>
                            <div class="odds-bar">

                                </div>
                                <div class="odd-item">

                                </div>
                            </div>
                        </div>
                        <div class="pack-stats">

                            <div class="pack-remaining ${lowClass}">
                                ${remaining < 50 ? '⚡ Running low' : remaining + ' remaining'}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        render();
