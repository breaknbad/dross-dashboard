<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR Randomness Analysis - Break'n Bad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0f1a;
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #1e293b;
        }
        .header h1 { font-size: 2rem; color: #f97316; margin-bottom: 8px; }
        .header p { color: #94a3b8; }
        
        .verdict-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid #334155;
        }
        .verdict-label { color: #94a3b8; font-size: 0.9rem; margin-bottom: 8px; }
        .verdict-value { font-size: 2.5rem; font-weight: bold; margin-bottom: 10px; }
        .verdict-random { color: #10b981; }
        .verdict-pattern { color: #f59e0b; }
        .verdict-insufficient { color: #6b7280; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-number { font-size: 2rem; font-weight: bold; color: #f97316; }
        .stat-label { color: #94a3b8; font-size: 0.85rem; margin-top: 5px; }
        
        .section { margin-bottom: 30px; }
        .section-title {
            font-size: 1.3rem;
            color: #f8fafc;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }
        
        .pack-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 15px;
        }
        .pack-card {
            background: #1e293b;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #334155;
        }
        .pack-card.pattern { border-left-color: #f59e0b; }
        .pack-card.random { border-left-color: #10b981; }
        .pack-name { font-weight: 600; margin-bottom: 8px; color: #f8fafc; }
        .pack-verdict { font-size: 0.85rem; margin-bottom: 8px; }
        .pack-verdict.pattern { color: #f59e0b; }
        .pack-verdict.random { color: #10b981; }
        .pack-details { font-size: 0.8rem; color: #94a3b8; }
        
        .sport-section { margin-bottom: 25px; }
        .sport-header {
            font-size: 1.1rem;
            color: #f97316;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sport-badge {
            background: #f97316;
            color: #0a0f1a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .loading { text-align: center; padding: 60px; color: #94a3b8; }
        .error { background: #dc2626; color: white; padding: 20px; border-radius: 8px; text-align: center; }
        
        .confidence-bar {
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #fb923c);
            border-radius: 4px;
        }
        
        .timestamp { text-align: center; color: #64748b; font-size: 0.8rem; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎲 IR Randomness Analysis</h1>
            <p>Statistical analysis of pack distribution patterns</p>
        </div>
        
        <div id="loading" class="loading">Loading analysis data...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="content" style="display: none;"></div>
    </div>

    <script>
        let data = null;

        async function loadData() {
            try {
                const response = await fetch('./randomness-data.json');
                if (!response.ok) throw new Error('Failed to load data');
                data = await response.json();
                render();
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error loading data: ' + e.message;
            }
        }

        function render() {
            document.getElementById('loading').style.display = 'none';
            const content = document.getElementById('content');
            content.style.display = 'block';
            
            const overall = data.overall || {};
            const packs = data.packAnalysis || [];
            const crossPack = data.crossPackPatterns || [];
            
            const verdictClass = overall.verdict?.includes('Insufficient') ? 'insufficient' : 
                                 overall.verdict?.includes('Pattern') ? 'pattern' : 'random';
            
            // Group packs by sport
            const bySport = {};
            packs.forEach(p => {
                const sport = p.sport || 'other';
                if (!bySport[sport]) bySport[sport] = [];
                bySport[sport].push(p);
            });
            
            // Count patterns vs random
            const patternCount = packs.filter(p => p.verdict?.includes('Pattern')).length;
            const randomCount = packs.filter(p => p.verdict?.includes('Random') || p.verdict?.includes('Appears')).length;
            
            let html = `
                <div class="verdict-card">
                    <div class="verdict-label">Overall Assessment</div>
                    <div class="verdict-value verdict-${verdictClass}">${overall.verdict || 'Unknown'}</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${(overall.confidence || 0) * 100}%"></div>
                    </div>
                    <div style="color: #94a3b8; margin-top: 10px; font-size: 0.9rem;">
                        ${Math.round((overall.confidence || 0) * 100)}% confidence
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${overall.packsAnalyzed || 0}</div>
                        <div class="stat-label">Packs Analyzed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${overall.totalSnapshots || 0}</div>
                        <div class="stat-label">Data Points</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: #f59e0b;">${patternCount}</div>
                        <div class="stat-label">Patterns Detected</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: #10b981;">${randomCount}</div>
                        <div class="stat-label">Appear Random</div>
                    </div>
                </div>
            `;
            
            // Cross-pack patterns summary
            if (crossPack.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">📊 Cross-Pack Patterns by Sport</div>
                        <div class="pack-grid">
                            ${crossPack.map(cp => `
                                <div class="pack-card ${cp.verdict?.includes('Pattern') ? 'pattern' : 'random'}">
                                    <div class="pack-name">${formatSport(cp.sport)} (${cp.pack_count} packs)</div>
                                    <div class="pack-verdict ${cp.verdict?.includes('Pattern') ? 'pattern' : 'random'}">
                                        ${cp.verdict}
                                    </div>
                                    <div class="pack-details">
                                        ${cp.details?.pattern_type || 'Analysis complete'}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            // Individual pack analysis by sport
            html += `<div class="section"><div class="section-title">🎯 Individual Pack Analysis</div>`;
            
            Object.keys(bySport).sort().forEach(sport => {
                const sportPacks = bySport[sport];
                html += `
                    <div class="sport-section">
                        <div class="sport-header">
                            ${formatSport(sport)}
                            <span class="sport-badge">${sportPacks.length} packs</span>
                        </div>
                        <div class="pack-grid">
                            ${sportPacks.map(p => `
                                <div class="pack-card ${p.verdict?.includes('Pattern') ? 'pattern' : 'random'}">
                                    <div class="pack-name">${p.name}</div>
                                    <div class="pack-verdict ${p.verdict?.includes('Pattern') ? 'pattern' : 'random'}">
                                        ${p.verdict} (${Math.round(p.confidence * 100)}% confidence)
                                    </div>
                                    <div class="pack-details">
                                        ${formatDetails(p.details)}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            html += `</div>`;
            
            // Timestamp
            const ts = new Date(overall.timestamp);
            html += `<div class="timestamp">Last updated: ${ts.toLocaleString()}</div>`;
            
            content.innerHTML = html;
        }
        
        function formatSport(sport) {
            const icons = {
                'baseball': '⚾',
                'basketball': '🏀',
                'football': '🏈',
                'pokemon': '⚡',
                'og_pokemon': '🎴',
                'mixed': '🎲',
                'other': '📦'
            };
            const names = {
                'baseball': 'Baseball',
                'basketball': 'Basketball', 
                'football': 'Football',
                'pokemon': 'Pokemon',
                'og_pokemon': 'OG Pokemon',
                'mixed': 'Mixed Sport',
                'other': 'Other'
            };
            return `${icons[sport] || '📦'} ${names[sport] || sport}`;
        }
        
        function formatDetails(details) {
            if (!details) return '';
            const parts = [];
            if (details.average_deviation_pct) parts.push(`${details.average_deviation_pct.toFixed(1)}% avg deviation`);
            if (details.significant_deviations) parts.push(`${details.significant_deviations} significant deviations`);
            if (details.total_observations) parts.push(`${details.total_observations} observations`);
            return parts.join(' • ') || 'Analysis complete';
        }

        loadData();
    </script>
</body>
</html>
